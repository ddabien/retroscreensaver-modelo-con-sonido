<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SpaceInvadersSaver</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: grid;
      place-items: stretch;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script src="main.js"></script>
</body>
</html>
